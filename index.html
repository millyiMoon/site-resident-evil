<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Evi</title>
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
</head>

<body>

    <section class="selection-container">
        <img src="./src/img/Logo-Resident-evil.png" alt="" class="logo">

        <div class="selection-content">

            <img src="./src/img/CHIRS/Chris-icon.png" alt="" class="img">
            <img src="./src/img/JILL/Jill-icon.png" alt="" class="img">
            <img src="./src/img/LEON/Leon-Icon.png" alt="" class="img">
            <img src="./src/img/CLAIRE/Claire-icon.png" alt="" class="img">
            <img src="./src/img/WESKER/wesker-icon.png" alt="" class="img">
            <img src="./src/img/ADA/Ada-icon.png" alt="" class="img">

        </div>

    </section>

    <section class="card-char">

        <h2 class="name">Chis Redfield</h2>

        <h3 class="description">
            Nome completo: Christopher Redfield

            Idade: Em Resident Evil 5 ele tem cerca de 37–38 anos, em Resident Evil Village tem cerca de 49–50 anos

            Altura: Aproximadamente 1,85 m – 1,88 m

            Peso: Cerca de 100–110 kg

            Nacionalidade: Americano

            Ex-membro da S.T.A.R.S. (Bravo Team → Alpha Team)</h3>

        <img src="src/img/funndo-cartao.png" alt="" class="img-card">

    </section>

    <section class="char-container">

        <!-- LEON -->
        <div class="char-content">

            <div class="info">

                <div class="status">
                    <span class=""></span>
                    <span class=""></span>
                </div>

                <span class="name"></span>

            </div>

            <img src="" alt="" class="img" />



    </section>

    <script src="./src/js/index.js"></script>
</body>

</html>
