<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resident Evi</title>
    <link rel="stylesheet" href="./src/css/reset.css">
    <link rel="stylesheet" href="./src/css/style.css">
    <link rel="stylesheet" href="./src/css/responsive.css">
</head>

<body>

    <section class="selection-container">
        <img src="./src/img/Logo-Resident-evil 1.png" alt="" class="logo">

        <div class="selection-content">

            <img src="./src/img/CHIRS/Chris-icon.png" alt="" class="img">
            <img src="./src/img/JILL/Jill-icon.png" alt="" class="img">
            <img src="./src/img/LEON/Leon-Icon.png" alt="" class="img">
            <img src="./src/img/CLAIRE/Claire-icon.png" alt="" class="img">
            <img src="./src/img/WESKER/wesker-icon.png" alt="" class="img">
            <img src="./src/img/ADA/Ada-icon.png" alt="" class="img">

        </div>

    </section>

    <section class="char-container">

        <!-- CHIRS -->
        <div class="char-content">
            <div class="personagem">
                <img src="./src/img/CHIRS/Chris-char.png" alt="" class="img" />
            </div>

            <div class="info">

                <div class="status">
                    <H1>chirs</H1>
                    <span class="habilidades">Força: 9.5 / 10</span>
                    <span class="habilidades">Agilidade: 7 / 10</span>
                    <span class="habilidades">Resistência: 9 / 10</span>
                    <span class="habilidades">Combate à Distância: 9 / 10</span>
                    <span class="habilidades">Combate Corpo a Corpo: 9.5 / 10</span>
                    <span class="habilidades">Força Mental: 8.5 / 10</span>
                </div>


            </div>

            
        </div>


    </section>




    <script src="./src/js/index.js"></script>
</body>

</html>
